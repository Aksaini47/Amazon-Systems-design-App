name: repairfully_camera
description: RepairFully — Amazon seller video manager mobile app
publish_to: 'none'
version: 2.0.0+8

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Camera & video
  camera: ^0.11.0+2
  native_camera_sound: ^0.0.3
  sensors_plus: ^5.0.1
  image: ^4.2.0

  # Barcode scanning
  mobile_scanner: ^5.2.3

  # OCR — Amazon Order ID detection
  google_mlkit_text_recognition: ^0.13.0

  # Image capture
  image_picker: ^1.1.2

  # File management
  path_provider: ^2.1.4
  file_picker: ^8.1.2

  # Permissions
  permission_handler: ^11.3.1

  # Networking
  http: ^1.2.2
  bonsoir: ^5.0.1

  # Storage & settings
  shared_preferences: ^2.3.2

  # Utils
  intl: ^0.19.0
  device_info_plus: ^10.1.0
  video_compress: ^3.1.2
  retry: ^3.1.2
  wakelock_plus: ^1.2.8  # Keep screen on during recording
  video_player: ^2.9.1   # Inline video preview in gallery

  # Firebase Crashlytics — crash reporting + non-fatal error tracking
  # NOTE: Native gradle plugins remain DISABLED in android/app/build.gradle
  # until `google-services.json` is dropped into android/app/. The Dart
  # packages compile fine without it; runtime initialization is gated by
  # `Firebase.apps.isNotEmpty` so the app gracefully no-ops when the JSON
  # is missing (see main.dart).
  firebase_core: ^3.6.0
  firebase_crashlytics: ^4.1.3
  shorebird_code_push: ^2.0.4  # Read patch number + force update prompts
  package_info_plus: ^8.0.0    # App version/build/package for About panel

# Pin transitive deps to versions that don't require the newer Flutter Gradle
# wrapper. package_info_plus 9.x leaves out compileSdk in its build.gradle and
# expects the project to inject it via the Flutter Android plugin in 3.27+;
# our Flutter version emits the older wrapper, so we cap to <9.
#
# camera_android_camerax 0.6.10+3 (auto-resolved by camera ^0.11.0+2) has a
# silent bug: it accepts the `fps` parameter from MediaSettings but never
# applies it to CameraX — verified by grep'ing the package source. The
# user's "60 fps" toggle has no effect because of this. Newer versions
# (0.6.30+) read mediaSettings.fps and wire it up via
# CameraIntegerRange + targetFpsRange on Preview + VideoCapture.
#
# camera_platform_interface 2.11.0+ is required by camera_android_camerax
# 0.6.30 (it bumped its dep). Top-level `camera: ^0.11.0+2` accepts
# camera_platform_interface ^2.6.0 so 2.11.x is still compatible.
dependency_overrides:
  package_info_plus: ^8.0.0
  camera_android_camerax: ^0.6.30
  camera_platform_interface: ^2.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/branding/app_icon_foreground.png
  adaptive_icon_background: "#F1641E"
  adaptive_icon_foreground: assets/branding/app_icon_foreground.png

flutter:
  assets:
    - shorebird.yaml
    - assets/branding/app_icon_foreground.png
    - assets/branding/rf_logo.png
  uses-material-design: true
