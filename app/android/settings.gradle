pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.11.1" apply false
    id "org.jetbrains.kotlin.android" version "2.1.0" apply false
    // Firebase Google Services plugin — required by firebase_core for Android.
    // Version 4.4.3 is compatible with AGP 8.x; bump when upgrading AGP.
    id "com.google.gms.google-services" version "4.4.3" apply false
    // Crashlytics Gradle plugin — uploads native symbols + mapping files at
    // build time so stack traces in console are readable.
    id "com.google.firebase.crashlytics" version "3.0.3" apply false
}

rootProject.name = "repairfully_camera"
include ':app'
